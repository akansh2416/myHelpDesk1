

services:
  mysql:
    image: mysql:8.0
    container_name: helpdesk-mysql
    environment:
      MYSQL_DATABASE: helpdesk_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - helpdesk-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: helpdesk-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/helpdesk_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_AI_GOOGLE_GENAI_API_KEY: ${GOOGLE_KEY}
      SPRING_AI_GOOGLE_GENAI_PROJECT_ID: ${GOOGLE_PROJECT_ID}
      SPRING_AI_GOOGLE_GENAI_LOCATION: us-central1
      JAVA_OPTS: "-Xmx512m -Xms256m"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - helpdesk-network
    restart: unless-stopped

volumes:
  mysql-data:

networks:
  helpdesk-network:
    driver: bridge
